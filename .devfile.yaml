schemaVersion: 2.1.0
metadata:
  name: platform-engineering-201
  displayName: Platform Engineering 201 Workshop
  description: Workshop workspace with Java 17 (UDI), Maven, Node.js 22.12+, and OpenShift tooling.
  attributes:
    che.eclipse.org/che-editor: che-incubator/che-code/latest
  tags:
    - java-17
    - nodejs-22
    - openshift
    - developer-hub

components:
  - name: dev
    container:
      # UDI supports Dev Spaces persistUserHome (stow at /home/user). Do not mount
      # volumes under /home/user — use /projects/* instead to avoid init-persistent-home conflicts.
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      mountSources: true
      memoryLimit: 4Gi
      memoryRequest: 1Gi
      cpuLimit: 4000m
      cpuRequest: 500m
      env:
        - name: HOME
          value: /home/user
        - name: MAVEN_OPTS
          value: -Dmaven.repo.local=/projects/.m2/repository
        - name: NODE_OPTIONS
          value: --max-old-space-size=2048
      volumeMounts:
        - name: m2
          path: /projects/.m2
        - name: npm-cache
          path: /projects/.npm-cache
        - name: yarn-cache
          path: /projects/.yarn-cache
      endpoints:
        - name: people-frontend
          exposure: public
          protocol: http
          targetPort: 5173
        - name: people-backend
          exposure: public
          protocol: http
          targetPort: 8080

  - name: m2
    volume:
      size: 5Gi

  - name: npm-cache
    volume:
      size: 2Gi

  - name: yarn-cache
    volume:
      size: 2Gi

commands:
  - id: refresh-tools
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        REPO="${DEVWORKSPACE_PROJECT_SOURCE:-${DEVWORKSPACE_NAME:-/projects/platform-engineering-201}}"
        cd "${REPO}"
        chmod +x devfile/install-tools.sh
        export PATH="${HOME}/.local/bin:${PATH}"
        bash devfile/install-tools.sh
        echo "Done. Open a new terminal or run: source ~/.bashrc  (or source ~/.zshrc)"

  - id: workspace-setup
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        REPO="${DEVWORKSPACE_PROJECT_SOURCE:-${DEVWORKSPACE_NAME:-/projects/platform-engineering-201}}"
        cd "${REPO}"
        chmod +x scripts/*.sh scripts/lib/*.sh devfile/install-tools.sh 2>/dev/null || true
        export PATH="${HOME}/.local/bin:${PATH}"
        if [[ -s "${HOME}/.nvm/nvm.sh" ]]; then
          # shellcheck source=/dev/null
          source "${HOME}/.nvm/nvm.sh"
        fi

        node_version_ok() {
          command -v node >/dev/null 2>&1 || return 1
          node -e 'const [maj,min]=process.versions.node.split(".").map(Number); process.exit((maj===22&&min>=12)||maj>=23?0:1)'
        }

        echo "Running install-tools (idempotent; upgrades Node to 22.12+ when needed)..."
        bash devfile/install-tools.sh
        export PATH="${HOME}/.local/bin:${PATH}"
        if [[ -s "${HOME}/.nvm/nvm.sh" ]]; then
          # shellcheck source=/dev/null
          source "${HOME}/.nvm/nvm.sh"
        fi

        if command -v java >/dev/null 2>&1; then
          export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v java)")")")"
          export PATH="${JAVA_HOME}/bin:${HOME}/.local/bin:${PATH}"
        fi

        if ! node_version_ok; then
          echo "ERROR: Node.js $(node --version 2>/dev/null || echo missing) is too old for this workshop."
          echo "Required: >=22.12.0. Run the devfile command 'refresh-tools' or: bash devfile/install-tools.sh"
          exit 1
        fi

        if [[ ! -f scripts/workshop.env ]]; then
          cp scripts/workshop.env.example scripts/workshop.env
          echo "Created scripts/workshop.env — edit before bootstrap."
        fi

        echo ""
        echo "=== Tool versions (workshop requirements) ==="
        echo "Java:  $(java -version 2>&1 | head -1)"
        echo "      (UDI ships Java 17; pom.xml targets release 17 — OK)"
        echo "Maven: $(mvn -version 2>&1 | head -1)"
        echo "Node:  $(node --version)  [required: v22.12+]"
        echo "npm:   $(npm --version)"
        echo "yarn:  $(yarn --version 2>/dev/null || echo 'not installed — run refresh-tools')"
        echo "oc:    $(oc version --client 2>/dev/null | head -1 || echo 'not installed')"
        echo "helm:  $(helm version --short 2>/dev/null || echo 'not installed')"
        echo "=== workspace-setup complete ==="

  - id: oc-login
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        if [[ -n "${KUBERNETES_SERVICE_HOST:-}" ]] && [[ -f /var/run/secrets/kubernetes.io/serviceaccount/token ]]; then
          oc login "https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT:-443}" \
            --token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            && oc whoami && exit 0
        fi
        oc login

  - id: bootstrap-workshop
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        cd "${DEVWORKSPACE_PROJECT_SOURCE}"
        source scripts/workshop.env
        ./scripts/bootstrap-workshop.sh

  - id: setup-developer-hub-config
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        cd "${DEVWORKSPACE_PROJECT_SOURCE}"
        source scripts/workshop.env
        ./scripts/setup-developer-hub-config.sh

  - id: validate-workshop
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        cd "${DEVWORKSPACE_PROJECT_SOURCE}"
        source scripts/workshop.env
        ./scripts/validate-workshop.sh

  - id: build-people-backend
    exec:
      component: dev
      commandLine: mvn -B -f apps/people-service/backend/pom.xml clean package -DskipTests

  - id: build-people-frontend
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        cd apps/people-service/frontend && npm ci && npm run build

  - id: build-aap-management-plugin
    exec:
      component: dev
      commandLine: ./scripts/build-custom-aap-management-plugin.sh

  - id: dev-people-frontend
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        cd apps/people-service/frontend && npm ci && npm run dev -- --host 0.0.0.0 --port 5173

events:
  postStart:
    - workspace-setup
