schemaVersion: 2.1.0
metadata:
  name: platform-engineering-201
  displayName: Platform Engineering 201 Workshop
  description: Workshop workspace with Java 21, Maven, Node.js 22, and OpenShift tooling.
  tags:
    - java-21
    - nodejs-22
    - openshift
    - developer-hub

components:
  - name: dev
    container:
      image: registry.redhat.io/ubi9/openjdk-21:latest
      mountSources: true
      memoryLimit: 12Gi
      memoryRequest: 4Gi
      cpuLimit: 4000m
      cpuRequest: 1000m
      env:
        - name: JAVA_HOME
          value: /usr/lib/jvm/java-21
        - name: MAVEN_OPTS
          value: -Dmaven.repo.local=/home/default/.m2/repository
        - name: NODE_OPTIONS
          value: --max-old-space-size=4096
      volumeMounts:
        - name: m2
          path: /home/default/.m2
        - name: npm-cache
          path: /home/default/.npm
        - name: yarn-cache
          path: /home/default/.cache/yarn
      endpoints:
        - name: people-frontend
          exposure: public
          protocol: http
          targetPort: 5173
        - name: people-backend
          exposure: public
          protocol: http
          targetPort: 8080

  - name: m2
    volume:
      size: 5Gi

  - name: npm-cache
    volume:
      size: 2Gi

  - name: yarn-cache
    volume:
      size: 2Gi

commands:
  - id: workspace-setup
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        REPO="${DEVWORKSPACE_PROJECT_SOURCE:-${DEVWORKSPACE_NAME:-/projects/platform-engineering-201}}"
        cd "${REPO}"
        chmod +x scripts/*.sh scripts/lib/*.sh devfile/install-tools.sh 2>/dev/null || true

        if ! java -version 2>&1 | grep -qE 'version "21'; then
          echo "WARNING: Java 21 not active (got: $(java -version 2>&1 | head -1))"
          export JAVA_HOME="/usr/lib/jvm/java-21"
          export PATH="/usr/lib/jvm/java-21/bin:/home/default/.local/bin:${PATH}"
          if [[ -x /usr/lib/jvm/java-21/bin/java ]]; then
            mkdir -p "${HOME}/.local/bin"
            ln -sf /usr/lib/jvm/java-21/bin/java "${HOME}/.local/bin/java" 2>/dev/null || true
          else
            echo "ERROR: Expected ubi9/openjdk-21 image (JAVA_HOME=/usr/lib/jvm/java-21)."
            echo "Stop the workspace and create a new one from branch 20260614-enable-ansible."
            bash devfile/install-tools.sh || true
            exit 1
          fi
        fi

        if ! command -v node >/dev/null 2>&1 || ! command -v oc >/dev/null 2>&1; then
          bash devfile/install-tools.sh
          export PATH="${HOME}/.local/bin:${PATH}"
        fi

        if ! node -e 'const [maj,min]=process.versions.node.split(".").map(Number); process.exit((maj===20&&min>=19)||(maj===22&&min>=12)||maj>=23?0:1)'; then
          echo "ERROR: Node.js $(node --version) is too old for AAP Management plugin build."
          echo "Required: ^20.19.0 || ^22.12.0 || >=23. Stop the workspace and recreate from this devfile.yaml."
          exit 1
        fi

        if [[ ! -f scripts/workshop.env ]]; then
          cp scripts/workshop.env.example scripts/workshop.env
          echo "Created scripts/workshop.env — edit before bootstrap."
        fi

        echo "=== Tool versions ==="
        java -version 2>&1 | head -1
        mvn -version 2>&1 | head -1
        node --version
        npm --version
        yarn --version 2>/dev/null || echo "yarn: install via install-tools"
        oc version --client 2>/dev/null || echo "oc: not installed"
        helm version --short 2>/dev/null || echo "helm: not installed"

  - id: oc-login
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        if [[ -n "${KUBERNETES_SERVICE_HOST:-}" ]] && [[ -f /var/run/secrets/kubernetes.io/serviceaccount/token ]]; then
          oc login "https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT:-443}" \
            --token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            && oc whoami && exit 0
        fi
        oc login

  - id: bootstrap-workshop
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        cd "${DEVWORKSPACE_PROJECT_SOURCE}"
        source scripts/workshop.env
        ./scripts/bootstrap-workshop.sh

  - id: setup-developer-hub-config
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        cd "${DEVWORKSPACE_PROJECT_SOURCE}"
        source scripts/workshop.env
        ./scripts/setup-developer-hub-config.sh

  - id: validate-workshop
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        cd "${DEVWORKSPACE_PROJECT_SOURCE}"
        source scripts/workshop.env
        ./scripts/validate-workshop.sh

  - id: build-people-backend
    exec:
      component: dev
      commandLine: mvn -B -f apps/people-service/backend/pom.xml clean package -DskipTests

  - id: build-people-frontend
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        cd apps/people-service/frontend && npm ci && npm run build

  - id: build-aap-management-plugin
    exec:
      component: dev
      commandLine: ./scripts/build-custom-aap-management-plugin.sh

  - id: dev-people-frontend
    exec:
      component: dev
      commandLine: |
        set -euo pipefail
        cd apps/people-service/frontend && npm ci && npm run dev -- --host 0.0.0.0 --port 5173

events:
  postStart:
    - workspace-setup
