name: Build and Push Container Images

on:
  push:
    branches: [main]
    paths:
      - 'apps/people-service/**'
      - '.github/workflows/build-and-push.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/platform-engineering-201

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend
        working-directory: apps/people-service/backend
        run: mvn -B -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/people-service/backend
          file: apps/people-service/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/people-backend:latest
            ${{ env.IMAGE_PREFIX }}/people-backend:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: apps/people-service/frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/people-frontend:latest
            ${{ env.IMAGE_PREFIX }}/people-frontend:${{ github.sha }}
