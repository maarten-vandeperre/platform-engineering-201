apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: people-rest-api
  title: People REST API
  description: OpenAPI specification for the People CRUD backend secured with Keycloak.
  annotations:
    github.com/project-slug: ${WORKSHOP_GITHUB_ORG}/${WORKSHOP_GITHUB_REPO}
    backstage.io/source-location: url:https://github.com/${WORKSHOP_GITHUB_ORG}/${WORKSHOP_GITHUB_REPO}/tree/${WORKSHOP_GIT_BRANCH}/apps/people-service/
    orchestrator.io/workflows: '["create-person"]'
  tags:
    - openapi
    - rest
    - keycloak
  links:
    - url: https://redhat-developer-hub-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}/catalog/default/api/people-rest-api/definition
      title: Swagger UI
      icon: docs
    - url: https://people-backend-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}/q/openapi
      title: Raw OpenAPI (YAML)
      icon: catalog
    - url: https://github.com/${WORKSHOP_GITHUB_ORG}/${WORKSHOP_GITHUB_REPO}/actions
      title: GitHub Actions
      icon: github
    - url: https://github.com/${WORKSHOP_GITHUB_ORG}/${WORKSHOP_GITHUB_REPO}/tree/${WORKSHOP_GIT_BRANCH}/apps/people-service
      title: Source code
      icon: github
spec:
  type: openapi
  lifecycle: production
  owner: guests
  system: people-platform
  definition:
    $text: https://workshop-catalog-server-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}/people-api.yaml
