# Organization catalog model: 1 org, 3 teams, 8 users, 2 platforms, 4 applications,
# PostgreSQL database, Keycloak security, and Kafka (order-processor + topics).
# See manifests/gitops/catalog/diagrams/organization-entity-diagram.md for the diagram.

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: nile-digital
  title: Nile Digital
  description: Root organization for the workshop platform estate.
spec:
  type: root-organization
  profile:
    displayName: Nile Digital
  children:
    - platform-team
    - product-team
    - data-team

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-team
  title: Platform Engineering
  description: Internal developer platform, GitOps, and shared services.
spec:
  type: team
  parent: nile-digital
  children: []
  members:
    - alice-chen
    - bob-martin
    - carol-rivera

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: product-team
  title: Product Delivery
  description: Customer-facing APIs and business applications.
spec:
  type: team
  parent: nile-digital
  children: []
  members:
    - dave-kumar
    - eve-johnson
    - frank-okonkwo

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: data-team
  title: Data & Integration
  description: Event streaming, analytics pipelines, and integration services.
spec:
  type: team
  parent: nile-digital
  children: []
  members:
    - grace-lombardi
    - henry-petrov

