---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: integration-platform
  title: Integration Platform
  description: Event-driven integration layer with Kafka messaging.
spec:
  owner: data-team

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: workshop-postgresql
  title: Workshop PostgreSQL
  description: Shared PostgreSQL cluster for transactional applications.
  tags:
    - postgres
    - database
spec:
  type: database
  owner: platform-team
  system: people-platform

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: workshop-keycloak
  title: Workshop Keycloak
  description: OIDC provider securing all workshop applications.
  links:
    - url: ${KEYCLOAK_URL}
      title: Keycloak admin console
      icon: user
  tags:
    - keycloak
    - oidc
    - security
spec:
  type: auth-provider
  owner: platform-team

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: workshop-kafka
  title: Workshop Kafka Cluster
  description: Apache Kafka cluster for asynchronous integration.
  tags:
    - kafka
    - messaging
spec:
  type: messagebroker
  owner: data-team
  system: integration-platform

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: person-events-topic
  title: person-events
  description: Domain events emitted when a person record is created or updated.
  tags:
    - kafka
    - topic
spec:
  type: topic
  owner: data-team
  system: integration-platform
  dependsOn:
    - resource:default/workshop-kafka

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: order-events-topic
  title: order-events
  description: Order lifecycle events consumed by downstream processors.
  tags:
    - kafka
    - topic
spec:
  type: topic
  owner: data-team
  system: integration-platform
  dependsOn:
    - resource:default/workshop-kafka

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: billing-service
  title: Billing Service
  description: Invoices and payment status API backed by PostgreSQL.
  tags:
    - java
    - postgres
    - keycloak
spec:
  type: service
  lifecycle: production
  owner: product-team
  system: people-platform
  dependsOn:
    - resource:default/workshop-postgresql
    - resource:default/workshop-keycloak

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: inventory-service
  title: Inventory Service
  description: Stock and warehouse API backed by PostgreSQL.
  tags:
    - java
    - postgres
    - keycloak
spec:
  type: service
  lifecycle: production
  owner: product-team
  system: people-platform
  dependsOn:
    - resource:default/workshop-postgresql
    - resource:default/workshop-keycloak

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: order-processor
  title: Order Processor
  description: Event-driven order workflow; publishes and consumes Kafka topics.
  tags:
    - kafka
    - quarkus
    - keycloak
spec:
  type: service
  lifecycle: production
  owner: data-team
  system: integration-platform
  dependsOn:
    - resource:default/workshop-kafka
    - resource:default/person-events-topic
    - resource:default/order-events-topic
    - resource:default/workshop-keycloak
