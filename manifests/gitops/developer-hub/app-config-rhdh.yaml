apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: ${RHDH_NAMESPACE}
data:
  app-config-rhdh.yaml: |
    app:
      title: ${RHDH_APP_TITLE}
      sidebar:
        logo: true
      extensions:
        - entity-card:catalog-graph/relations:
            config:
              title: Relations
              height: 400
              maxDepth: 1
        - page:catalog-graph
      baseUrl: https://PLACEHOLDER-RHDH-ROUTE

    backend:
      baseUrl: https://PLACEHOLDER-RHDH-ROUTE
      reading:
        allow:
          - host: people-backend-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}
          - host: workshop-catalog-server-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}
      cors:
        origin: https://PLACEHOLDER-RHDH-ROUTE
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      auth:
        externalAccess:
          - type: legacy
            options:
              secret: ${BACKEND_SECRET}
              subject: legacy-default-config
          - type: static
            options:
              token: ${PEOPLE_NOTIFICATION_TOKEN}
              subject: people-service
            accessRestrictions:
              - plugin: notifications
      database:
        connection:
          password: ${POSTGRESQL_ADMIN_PASSWORD}
          user: postgres

    auth:
      environment: production
      session:
        secret: ${BACKEND_SECRET}
      providers:
        oidc:
          production:
            metadataUrl: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/.well-known/openid-configuration
            clientId: ${RHDH_KEYCLOAK_CLIENT_ID}
            clientSecret: ${RHDH_OIDC_CLIENT_SECRET}
            prompt: auto
            signIn:
              resolvers:
                - resolver: preferredUsernameMatchingUserEntityName
                  dangerouslyAllowSignInWithoutUserInCatalog: true
        github:
          production:
            clientId: ${AUTH_GITHUB_CLIENT_ID}
            clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
            signIn:
              resolvers:
                - resolver: usernameMatchingUserEntityName
                  dangerouslyAllowSignInWithoutUserInCatalog: true

    signInPage: oidc

    catalog:
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: main
      rules:
        - allow: [Component, System, API, Resource, Location, Template, User, Group]
      locations:
        - type: file
          target: /catalog/entities.yaml
        - type: url
          target: PLACEHOLDER-CATALOG-URL

    argocd:
      appLocatorMethods:
        - type: config
          instances:
            - name: workshop
              url: ${ARGOCD_URL}
              token: ${ARGOCD_TOKEN}
      projectSettings:
        clusterResourceWhitelist:
          - group: ''
            kind: Namespace
        namespaceResourceWhitelist:
          - group: apps
            kind: Deployment
          - group: ''
            kind: Service
          - group: route.openshift.io
            kind: Route

    proxy:
      endpoints:
        '/github/api':
          target: https://api.github.com
          headers:
            Authorization: Bearer ${GITHUB_TOKEN}
        '/developer-hub/learning-paths':
          target: https://workshop-catalog-server-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}
          pathRewrite:
            '^/api/proxy/developer-hub/learning-paths': '/learning-paths.json'
          changeOrigin: true
          secure: true

    techdocs:
      builder: 'local'
      generator:
        runIn: 'local'
      publisher:
        type: 'local'

    orchestrator:
      dataIndexService:
        url: http://sonataflow-platform-data-index-service:8080

    integrations:
      github:
        - host: github.com
          apiBaseUrl: https://api.github.com
          rawBaseUrl: https://raw.githubusercontent.com
          token: ${GITHUB_TOKEN}

    techRadar:
      url: https://workshop-catalog-server-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}/tech-radar.json

    kubernetes:
      serviceLocatorMethod:
        type: singleTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: openshift
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              serviceAccountToken: ${K8S_CLUSTER_TOKEN}
              skipTLSVerify: true
              skipMetricsLookup: true
      customResources:
        - group: route.openshift.io
          apiVersion: v1
          plural: routes
