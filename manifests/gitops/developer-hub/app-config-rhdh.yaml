apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: ${RHDH_NAMESPACE}
data:
  app-config-rhdh.yaml: |
    app:
      title: ${RHDH_APP_TITLE}
      baseUrl: https://PLACEHOLDER-RHDH-ROUTE

    backend:
      baseUrl: https://PLACEHOLDER-RHDH-ROUTE
      reading:
        allow:
          - host: people-backend-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}
          - host: workshop-catalog-server-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}
      cors:
        origin: https://PLACEHOLDER-RHDH-ROUTE
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      auth:
        externalAccess:
          - type: legacy
            options:
              secret: ${BACKEND_SECRET}
              subject: legacy-default-config
      database:
        connection:
          password: ${POSTGRESQL_ADMIN_PASSWORD}
          user: postgres

    auth:
      environment: production
      session:
        secret: ${BACKEND_SECRET}
      providers:
        oidc:
          production:
            metadataUrl: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/.well-known/openid-configuration
            clientId: ${RHDH_KEYCLOAK_CLIENT_ID}
            clientSecret: ${RHDH_OIDC_CLIENT_SECRET}
            prompt: auto
            signIn:
              resolvers:
                - resolver: preferredUsernameMatchingUserEntityName
                  dangerouslyAllowSignInWithoutUserInCatalog: true

    signInPage: oidc

    catalog:
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: main
      rules:
        - allow: [Component, System, API, Resource, Location, Template, User, Group]
      locations:
        - type: file
          target: /catalog/entities.yaml
        - type: url
          target: PLACEHOLDER-CATALOG-URL

    argocd:
      appLocatorMethods:
        - type: config
          instances:
            - name: workshop
              url: ${ARGOCD_URL}
              token: ${ARGOCD_TOKEN}
      projectSettings:
        clusterResourceWhitelist:
          - group: ''
            kind: Namespace
        namespaceResourceWhitelist:
          - group: apps
            kind: Deployment
          - group: ''
            kind: Service
          - group: route.openshift.io
            kind: Route

    proxy:
      endpoints:
        '/github/api':
          target: https://api.github.com
          headers:
            Authorization: Bearer ${GITHUB_TOKEN}

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    kubernetes:
      serviceLocatorMethod:
        type: singleTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: openshift
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              serviceAccountToken: ${K8S_CLUSTER_TOKEN}
              skipTLSVerify: true
              skipMetricsLookup: true
      customResources:
        - group: route.openshift.io
          apiVersion: v1
          plural: routes
