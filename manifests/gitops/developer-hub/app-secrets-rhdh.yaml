apiVersion: v1
kind: Secret
metadata:
  name: app-secrets-rhdh
  namespace: ${RHDH_NAMESPACE}
type: Opaque
stringData:
  # Replace with a GitHub PAT for GitHub Actions and scaffolder integration.
  # For read-only workflow visibility, repo scope is sufficient.
  GITHUB_TOKEN: "changeme"
  BACKEND_SECRET: "workshop-backend-secret"
  ARGOCD_URL: "https://changeme"
  ARGOCD_TOKEN: "changeme"
  K8S_SA_TOKEN: "changeme"
  K8S_CA_DATA: "changeme"
  RHDH_OIDC_CLIENT_SECRET: "${RHDH_KEYCLOAK_CLIENT_SECRET}"
