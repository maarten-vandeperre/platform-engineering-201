apiVersion: apps/v1
kind: Deployment
metadata:
  name: people-frontend
  namespace: ${WORKSHOP_NAMESPACE}
  labels:
    app: people-frontend
    app.kubernetes.io/part-of: people-service
    app.openshift.io/runtime: nodejs
    backstage.io/kubernetes-id: people-service
  annotations:
    argocd/app-name: ${ARGOCD_APP_NAME}
    app.openshift.io/vcs-uri: https://github.com/${WORKSHOP_GITHUB_ORG}/${WORKSHOP_GITHUB_REPO}
    app.openshift.io/vcs-ref: ${WORKSHOP_GIT_BRANCH}
    app.openshift.io/connects-to: '[{"apiVersion":"v1","kind":"Service","name":"people-backend"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: people-frontend
  template:
    metadata:
      labels:
        app: people-frontend
        app.kubernetes.io/part-of: people-service
        app.openshift.io/runtime: nodejs
        backstage.io/kubernetes-id: people-service
    spec:
      containers:
        - name: frontend
          image: ${WORKSHOP_FRONTEND_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: people-workshop-runtime
          env:
            - name: WORKSHOP_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: people-frontend-nginx