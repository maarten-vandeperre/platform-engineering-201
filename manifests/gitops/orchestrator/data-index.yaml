# Standalone SonataFlow Data Index for Developer Hub Orchestrator.
# Used when OpenShift Serverless Logic is not installed (no SonataFlowPlatform CR).
# Creates sonataflow-platform-data-index-service expected by app-config-rhdh.yaml.
apiVersion: batch/v1
kind: Job
metadata:
  name: sonataflow-create-db
  namespace: ${WORKSHOP_NAMESPACE}
  labels:
    app.kubernetes.io/part-of: developer-hub
    app.kubernetes.io/component: orchestrator
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: developer-hub
        app.kubernetes.io/component: orchestrator
    spec:
      restartPolicy: Never
      containers:
        - name: create-db
          image: registry.redhat.io/rhel9/postgresql-16:latest
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: redhat-developer-hub-postgresql-svcbind-postgres
                  key: password
          command:
            - bash
            - -ec
            - |
              until timeout 2 bash -c '>/dev/tcp/redhat-developer-hub-postgresql/5432'; do
                echo "Waiting for Developer Hub PostgreSQL..."
                sleep 2
              done
              psql -h redhat-developer-hub-postgresql -U postgres -c "CREATE DATABASE sonataflow;" 2>&1 || {
                if psql -h redhat-developer-hub-postgresql -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='sonataflow'" | grep -q 1; then
                  echo "Database sonataflow already exists."
                else
                  exit 1
                fi
              }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonataflow-platform-data-index
  namespace: ${WORKSHOP_NAMESPACE}
  labels:
    app.kubernetes.io/part-of: developer-hub
    app.kubernetes.io/component: orchestrator
    app.kubernetes.io/name: sonataflow-platform-data-index
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sonataflow-platform-data-index
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: developer-hub
        app.kubernetes.io/component: orchestrator
        app.kubernetes.io/name: sonataflow-platform-data-index
    spec:
      containers:
        - name: data-index
          image: ${ORCHESTRATOR_DATA_INDEX_IMAGE}
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: redhat-developer-hub-postgresql-svcbind-postgres
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redhat-developer-hub-postgresql-svcbind-postgres
                  key: password
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:postgresql://redhat-developer-hub-postgresql:5432/sonataflow?currentSchema=data-index-service
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: postgresql
            - name: QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION
              value: update
            - name: QUARKUS_KAFKA_HEALTH_ENABLE
              value: "false"
            - name: QUARKUS_HTTP_CORS
              value: "true"
            - name: QUARKUS_HTTP_CORS_ORIGINS
              value: /.*/
            - name: QUARKUS_FLYWAY_MIGRATE_AT_START
              value: "true"
            - name: KOGITO_DATA_INDEX_QUARKUS_PROFILE
              value: http-events-support
            - name: QUARKUS_HTTP_PORT
              value: "8080"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sonataflow-platform-data-index-service
  namespace: ${WORKSHOP_NAMESPACE}
  labels:
    app.kubernetes.io/part-of: developer-hub
    app.kubernetes.io/component: orchestrator
spec:
  selector:
    app.kubernetes.io/name: sonataflow-platform-data-index
  ports:
    - name: http
      port: 8080
      targetPort: http
