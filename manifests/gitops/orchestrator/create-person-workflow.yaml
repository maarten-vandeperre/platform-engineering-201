apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: create-person-workflow
  namespace: ${WORKSHOP_NAMESPACE}
  labels:
    app.kubernetes.io/part-of: developer-hub
    app.kubernetes.io/component: orchestrator
spec:
  lookupPolicy:
    local: true
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: create-person-workflow
  namespace: ${WORKSHOP_NAMESPACE}
  labels:
    app.kubernetes.io/part-of: developer-hub
    app.kubernetes.io/component: orchestrator
spec:
  output:
    to:
      kind: ImageStreamTag
      name: create-person-workflow:latest
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi
  successfulBuildsHistoryLimit: 2
  failedBuildsHistoryLimit: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: create-person-workflow
  namespace: ${WORKSHOP_NAMESPACE}
  labels:
    app.kubernetes.io/part-of: developer-hub
    app.kubernetes.io/component: orchestrator
    app.kubernetes.io/name: create-person-workflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: create-person-workflow
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: developer-hub
        app.kubernetes.io/component: orchestrator
        app.kubernetes.io/name: create-person-workflow
    spec:
      containers:
        - name: workflow
          image: ${WORKSHOP_IMAGE_REGISTRY}/create-person-workflow:latest
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          env:
            - name: KEYCLOAK_HOST
              value: ${KEYCLOAK_HOST}
            - name: KEYCLOAK_REALM
              value: ${KEYCLOAK_REALM}
            - name: KEYCLOAK_CLIENT_ID
              value: ${KEYCLOAK_CLIENT_ID}
            - name: KEYCLOAK_SERVICE_USER
              value: ${PEOPLE_KEYCLOAK_USER}
            - name: KEYCLOAK_SERVICE_PASSWORD
              value: ${PEOPLE_KEYCLOAK_PASSWORD}
            - name: PEOPLE_BACKEND_HOST
              value: people-backend-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}
            - name: PGHOST
              value: redhat-developer-hub-postgresql
            - name: PGUSER
              value: postgres
            - name: PGDATABASE
              value: sonataflow
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: redhat-developer-hub-postgresql-svcbind-postgres
                  key: password
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: create-person-workflow
  namespace: ${WORKSHOP_NAMESPACE}
  labels:
    app.kubernetes.io/part-of: developer-hub
    app.kubernetes.io/component: orchestrator
spec:
  selector:
    app.kubernetes.io/name: create-person-workflow
  ports:
    - name: http
      port: 8080
      targetPort: http
