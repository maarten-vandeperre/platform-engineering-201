apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: create-person
  namespace: ${WORKSHOP_NAMESPACE}
  labels:
    app.kubernetes.io/part-of: developer-hub
  annotations:
    sonataflow.org/profile: preview
    sonataflow.org/version: "1.0"
    sonataflow.org/description: Create a person in the People REST API
spec:
  podTemplate:
    container:
      env:
        - name: KOGITO_SW_FUNCTIONS_GETKEYCLOAKTOKEN_HOST
          value: ${KEYCLOAK_HOST}
        - name: KOGITO_SW_FUNCTIONS_CREATEPERSON_HOST
          value: people-backend-${WORKSHOP_NAMESPACE}.${CLUSTER_ROUTER_BASE}
        - name: KOGITO_SW_FUNCTIONS_CREATEPERSON_PORT
          value: "443"
        - name: KOGITO_SW_FUNCTIONS_CREATEPERSON_PROTOCOL
          value: https
  flow:
    id: create-person
    version: "1.0"
    specVersion: "0.8"
    name: Create Person in People API
    description: Authenticates with Keycloak and creates a person via the People REST API
    annotations:
      - workflow-type/infrastructure
    dataInputSchema: schemas/create-person.input-schema.json
    extensions:
      - extensionid: workflow-output-schema
        outputSchema: schemas/create-person.output-schema.json
    start: CreatePerson
    functions:
      - name: getKeycloakToken
        type: custom
        operation: rest:post:/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token
      - name: createPerson
        type: custom
        operation: rest:post:/api/people
    states:
      - name: CreatePerson
        type: operation
        actions:
          - name: Authenticate
            functionRef:
              refName: getKeycloakToken
              arguments:
                client_id: ${KEYCLOAK_CLIENT_ID}
                username: "${ .username }"
                password: "${ .password }"
                grant_type: password
            actionDataFilter:
              useResults: true
              results: "${ .access_token }"
              toStateData: "${ .accessToken }"
          - name: CreateRecord
            functionRef:
              refName: createPerson
              arguments:
                firstName: "${ .firstName }"
                lastName: "${ .lastName }"
                age: "${ .age }"
                Authorization: "${ \"Bearer \" + .accessToken }"
        end: true
