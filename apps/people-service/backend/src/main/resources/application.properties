quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:people}
quarkus.datasource.password=${DB_PASSWORD:people}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/people}

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

quarkus.smallrye-health.root-path=/q/health

quarkus.smallrye-openapi.path=/q/openapi
mp.openapi.extensions.smallrye.info.title=People REST API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=CRUD API for Person records secured with Keycloak

quarkus.http.auth.permission.openapi.paths=/q/openapi,/q/openapi/*,/openapi.yaml,/openapi.json
quarkus.http.auth.permission.openapi.policy=permit

quarkus.smallrye-openapi.always-include=true

# OIDC — validates Bearer tokens issued by Keycloak for the people-service client
quarkus.oidc.enabled=${OIDC_ENABLED:true}
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/workshop}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:people-service}
quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=realm_access/roles
quarkus.oidc.token.verify-access-token-with-user-info=false

quarkus.http.auth.permission.health.paths=/q/health,/q/health/*
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

%dev.quarkus.oidc.enabled=false
%dev.quarkus.http.auth.permission.authenticated.policy=permit
